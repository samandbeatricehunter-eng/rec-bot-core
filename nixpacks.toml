# Nixpacks / Railway monorepo build.
# Each Railway service must set RAILWAY_SERVICE_NAME (or the service name) so
# `scripts/railway-build.mjs` only builds that service + @rec/shared.
# Do NOT use `pnpm -r build` here — that rebuilds api+bot+web+site every deploy.

providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = [
  "corepack enable",
  "corepack prepare pnpm@10.11.0 --activate",
  "pnpm install --frozen-lockfile --prefer-offline"
]

[phases.build]
cmds = ["pnpm run build"]
